server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /values/ {
        alias /usr/share/nginx/html/values/;
        add_header Cache-Control "no-cache";
    }

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
