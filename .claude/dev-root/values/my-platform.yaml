global:
  domain: platform.internal.local
  storageClass: longhorn

argo-cd:
  server:
    replicas: 2
    image:
      repository: quay.io/argoproj/argocd
      tag: v2.10.0
    ingress:
      enabled: true
      hostname: argocd.platform.internal.local
  repoServer:
    replicas: 2
    image:
      repository: quay.io/argoproj/argocd
      tag: v2.10.0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  redis:
    enabled: true
    image:
      repository: redis
      tag: 7-alpine
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

cert-manager:
  installCRDs: true
  replicaCount: 1
  image:
    repository: quay.io/jetstack/cert-manager-controller
    tag: v1.14.4
