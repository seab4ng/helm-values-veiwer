architecture: standalone
auth:
  enabled: false
  password: ""
image:
  repository: redis
  tag: 7-alpine
  pullPolicy: IfNotPresent
master:
  service:
    type: ClusterIP
    port: 6379
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 128Mi
  persistence:
    enabled: true
    size: 1Gi
replica:
  replicaCount: 0
metrics:
  enabled: false
  serviceMonitor:
    enabled: false
